<?xml version="1.0" encoding="UTF-8"?>
<configuration>
    <input>
        <net-file value="network.net.xml"/>
        <route-files value="routes.rou.xml"/>
    </input>
    <time>
        <begin value="0"/>
        <end value="3600"/>
        <step-length value="1"/>
    </time>
    <processing>
        <no-step-log value="true"/>
    </processing>
    <report>
        <no-warnings value="true"/>
        <error-log value="sumo_errors.log"/>
    </report>
</configuration>